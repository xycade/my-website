baseURL = 'https://xyc-gamma.vercel.app/' # 建议以后改成你自定义的域名
languageCode = 'zh-cn'
title = 'Yucheng Xu' # 浏览器标签页显示的标题
theme = 'PaperMod'

[params]
    env = "production"
    title = "Yucheng Xu"
    description = "写下你的座右铭或者一句话自我介绍"
    keywords = ["Blog", "Portfolio", "Python"]
    author = "Yucheng"

    # 进入“个人名片模式”
    [params.profileMode]
        enabled = true
        title = "你好，我是 Yucheng Xu 👋"
        subtitle = "这里展示你的身份：例如 Python 开发者 / 某某大学学生 / 终身学习者"
        displayFullContent = false
        imageUrl = "img/avatar.png" # 头像路径，稍后教你放图
        imageWidth = 150
        imageHeight = 180

        # 首页上的功能按钮
        [[params.profileMode.buttons]]
            name = "查看我的项目"
            url = "posts"
        [[params.profileMode.buttons]]
            name = "关于我"
            url = "about"

    # 社交媒体链接（会自动显示图标）
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/xycade"
    [[params.socialIcons]]
        name = "email"
        url = "mailto:你的邮箱@example.com"

# 导航栏配置
[[menu.main]]
    name = "文章"
    url = "posts"
    weight = 10
[[menu.main]]
    name = "搜索"
    url = "search"
    weight = 20